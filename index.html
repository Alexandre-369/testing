<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Apple Style</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: linear-gradient(180deg, #f5f5f7, #e9ecf1);
  margin: 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 24px;
}

h1 {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.filters {
  display: flex;
  gap: 12px;
  margin: 20px 0;
}

select, input {
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.08);
  background: white;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}

.card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.1);
}

.price {
  font-weight: 700;
  margin-top: 10px;
  font-size: 16px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
</style>
</head>

<body>
<div class="container">
<h1>🍎 Catálogo</h1>

<div class="filters">
  <input id="search" placeholder="Buscar...">
  <select id="chip"></select>
  <select id="ram"></select>
  <select id="ssd"></select>
</div>

<div id="grid" class="grid"></div>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTOiFkeQwYW0SG5gt5IGirEXmVfCB_SyLbUfxJFWJeO6Jf_FmN-Cs4V0xeaiUegBP4f3-IFLfMJE0_/pub?output=csv";

let data = [];

fetch(url)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split("\n").slice(1);

  data = rows.map(r => {
    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    return {
      nome: c[0]?.replace(/"/g, ""),
      chip: c[1]?.replace(/"/g, ""),
      ram: c[2]?.replace(/"/g, ""),
      ssd: c[3]?.replace(/"/g, ""),
      preco: Number(c[4]?.replace(/"/g, "")),
      cor: c[5]?.replace(/"/g, "")
    };
  });

  populate();
  render();
});

function populate() {
  const chips = [...new Set(data.map(d => d.chip))];
  const ram = [...new Set(data.map(d => d.ram))];
  const ssd = [...new Set(data.map(d => d.ssd))];

  fill("chip", chips);
  fill("ram", ram);
  fill("ssd", ssd);
}

function fill(id, arr) {
  const el = document.getElementById(id);
  el.innerHTML = '<option value="">Todos</option>';
  arr.forEach(v => {
    el.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

function render() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();
  const chip = document.getElementById("chip").value;
  const ram = document.getElementById("ram").value;
  const ssd = document.getElementById("ssd").value;

  const filtered = data.filter(d =>
    (!chip || d.chip == chip) &&
    (!ram || d.ram == ram) &&
    (!ssd || d.ssd == ssd) &&
    JSON.stringify(d).toLowerCase().includes(search)
  );

  grid.innerHTML = filtered.map(d => `
    <div class="card">
      <div><strong>${d.nome}</strong></div>
      <div>${d.chip} · ${d.ram}GB · ${d.ssd}GB</div>
      <div class="price">R$ ${d.preco.toLocaleString('pt-BR')}</div>
    </div>
  `).join("");
}

['search','chip','ram','ssd'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});
</script>

</body>
</html>
