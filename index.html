<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Apple Style</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: #f5f5f7;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 28px;
  font-weight: 600;
}

.filters {
  display: flex;
  gap: 10px;
  margin: 20px 0;
}

select, input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.price {
  font-weight: bold;
  margin-top: 10px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
</style>
</head>

<body>
<div class="container">
<h1>🍎 Catálogo</h1>

<div class="filters">
  <input id="search" placeholder="Buscar...">
  <select id="chip"></select>
  <select id="ram"></select>
  <select id="ssd"></select>
</div>

<div id="grid" class="grid"></div>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-AC-76sH_l0muf9O1fpbtS1Rz0Nkf_8WWIxz-PUdwHIkXZ-kgioBZgBewuiGekPfswiokYLUIfYRm/pub?output=csv";

let data = [];

fetch(url)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split("\n");
  
  data = rows.slice(1).map(row => {
    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // CSV inteligente

    return {
      nome: (cols[0] || "").trim(),
      chip: (cols[1] || "").trim(),
      ram: (cols[2] || "").trim(),
      ssd: (cols[3] || "").trim(),
      preco: (cols[4] || "").trim(),
      cor: (cols[5] || "").trim()
    };
  }).filter(d => d.nome); // remove linhas vazias

  populate();
  render();
});

function populate() {
  const chips = [...new Set(data.map(d => d.chip))];
  const ram = [...new Set(data.map(d => d.ram))];
  const ssd = [...new Set(data.map(d => d.ssd))];

  fill("chip", chips);
  fill("ram", ram);
  fill("ssd", ssd);
}

function fill(id, arr) {
  const el = document.getElementById(id);
  el.innerHTML = '<option value="">Todos</option>';
  arr.forEach(v => {
    el.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

function render() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();
  const chip = document.getElementById("chip").value;
  const ram = document.getElementById("ram").value;
  const ssd = document.getElementById("ssd").value;

  const filtered = data.filter(d =>
    (!chip || d.chip === chip) &&
    (!ram || d.ram === ram) &&
    (!ssd || d.ssd === ssd) &&
    JSON.stringify(d).toLowerCase().includes(search)
  );

  if (!filtered.length) {
    grid.innerHTML = "<p>Nenhum produto encontrado.</p>";
    return;
  }

  grid.innerHTML = filtered.map(d => `
    <div class="card">
      <div><strong>${d.nome}</strong></div>
      <div>${d.chip} · ${d.ram} · ${d.ssd}</div>
      <div class="price">R$ ${d.preco}</div>
    </div>
  `).join("");
}

['search','chip','ram','ssd'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});
</script>

</body>
</html>
